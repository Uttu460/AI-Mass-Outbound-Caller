<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OutboundAI - Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0} :root{--bg:#0d0d0d;--card:#161616;--border:#252525;--accent:#00ff88;--accent2:#00ccff;--danger:#ff4d4d;--warn:#ffaa00;--muted:#5a5a5a;--text:#e0e0e0;--text2:#aaa;--sans:'Segoe UI',system-ui,sans-serif;--r:12px} body{background:radial-gradient(circle at top,#17251c,#0d0d0d 45%);color:var(--text);font-family:var(--sans);min-height:100vh;line-height:1.45;font-size:14px} header{padding:24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(13,13,13,.92);backdrop-filter:blur(12px);z-index:10} h1{font-size:28px} nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;align-items:center}.tab{background:#141414;border:1px solid var(--border);color:var(--text2);padding:10px 14px;border-radius:999px;cursor:pointer;width:auto;display:inline-block;font-size:13px}.tab.active{color:#03140c;background:var(--accent);border-color:var(--accent)} main{padding:24px;display:grid;gap:18px}.panel{display:none}.panel.active{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}.card{background:rgba(22,22,22,.92);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.2)} .kpi{font-size:30px;font-weight:700;margin-top:8px} label{display:block;margin-bottom:6px;color:var(--text2)} input,select,textarea,button{width:100%;background:#0f0f0f;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:11px 12px} textarea{min-height:120px;resize:vertical} button{background:linear-gradient(135deg,var(--accent),#70ffb7);color:#052113;font-weight:700;cursor:pointer} button.secondary{background:#121212;color:var(--text);border-color:var(--border)} button.danger{background:linear-gradient(135deg,#d63c3c,#ff6b6b);color:#fff} .row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:12px}.mt{margin-top:14px}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:6px 10px;border:1px solid var(--border);border-radius:999px;color:var(--text2)} table{width:100%;border-collapse:collapse} th,td{padding:10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top} th{color:var(--text2)} .badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#1f1f1f;border:1px solid var(--border)} .ok{color:var(--accent)} .warn{color:var(--warn)} .err{color:#ff7a7a} .hidden{display:none}.progress{height:10px;background:#111;border:1px solid var(--border);border-radius:999px;overflow:hidden}.progress>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));width:0}.toast{position:fixed;right:18px;bottom:18px;background:#111;border:1px solid var(--border);padding:12px 14px;border-radius:12px;z-index:100}.split{display:grid;grid-template-columns:1.1fr 0.9fr;gap:16px}@media(max-width:900px){.split{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>OutboundAI Dashboard</h1><nav id="tabs"></nav></header>
<main id="panels"></main>
<script>
const tabs=['stats','single','batch','campaigns','agents','prompt','appointments','calls','crm','settings','logs','setup'];
const tabLabels={stats:'📊 Stats',single:'📞 Single Call',batch:'📋 Batch Call',campaigns:'🚀 Campaigns',agents:'🤖 Agents',prompt:'✏️ AI Prompt',appointments:'📅 Appointments',calls:'📝 Call Logs',crm:'👥 CRM',settings:'⚙️ Settings',logs:'📋 Logs',setup:'🔧 Setup'};
const $=id=>document.getElementById(id);
const api=(path,opts)=>fetch(path,opts).then(async r=>{const data=await r.json(); if(!r.ok) throw new Error(data.detail||data.message||'Request failed'); return data;});
const apiPost=(path,body)=>fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(async r=>{const data=await r.json(); if(!r.ok) throw new Error(data.detail||data.message||'Request failed'); return data;});
const apiDel=path=>fetch(path,{method:'DELETE'}).then(async r=>{const data=await r.json(); if(!r.ok) throw new Error(data.detail||data.message||'Request failed'); return data;});
let charts={},logTimer=null,logPaused=false,currentProfiles=[],currentCallsPage=1,batchContacts=[];
function toast(msg,type='ok'){const el=document.createElement('div');el.className='toast';el.textContent=msg;el.style.borderColor=type==='err'?'#ff4d4d':'#252525';document.body.appendChild(el);setTimeout(()=>el.remove(),2600)}
function showErr(id,msg){const el=$(id); if(el) el.textContent=msg||''}
function switchTab(name){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===`panel-${name}`)); if(name==='stats'){loadStats();loadLiveConfig()} if(name==='campaigns')loadCampaigns(); if(name==='agents')loadAgentProfiles(); if(name==='prompt')loadPrompt(); if(name==='appointments')loadAppointments(); if(name==='calls')loadCalls(currentCallsPage); if(name==='crm')loadCRM(); if(name==='settings')loadSettings(); if(name==='logs')loadLogs();}
function buildUI(){ $('tabs').innerHTML=tabs.map(t=>`<button class="tab ${t==='stats'?'active':''}" data-tab="${t}" onclick="switchTab('${t}')">${tabLabels[t]}</button>`).join(''); $('panels').innerHTML=`
<section class="panel active" id="panel-stats"><div class="grid"><div class="card"><div>Total Calls</div><div class="kpi" id="k-total">0</div></div><div class="card"><div>Booked</div><div class="kpi" id="k-booked">0</div></div><div class="card"><div>Not Interested</div><div class="kpi" id="k-ni">0</div></div><div class="card"><div>Booking Rate</div><div class="kpi" id="k-rate">0%</div></div><div class="card"><div>Avg Duration</div><div class="kpi" id="k-avg">0s</div></div></div><div class="card mt"><div class="chips" id="live-chips"></div></div><div class="grid mt"><div class="card"><canvas id="chart-outcomes"></canvas></div><div class="card"><canvas id="chart-timeline"></canvas></div><div class="card"><canvas id="chart-duration"></canvas></div></div></section>
<section class="panel" id="panel-single"><div class="card"><div class="row"><div><label>Phone</label><input id="f-phone" placeholder="+919876543210"></div><div><label>Lead Name</label><input id="f-lead" placeholder="there"></div><div><label>Business Name</label><input id="f-biz" placeholder="our company"></div><div><label>Service Type</label><input id="f-service" placeholder="our service"></div></div><div class="row"><div><label>Agent Profile</label><select id="f-agent-profile"></select></div><div><label><input type="checkbox" id="f-use-prompt" style="width:auto"> Custom Prompt</label><textarea id="f-prompt" class="hidden"></textarea></div></div><div class="mt"><button onclick="submitSingleCall()">Start Call</button></div></div></section>
<section class="panel" id="panel-batch"><div class="card"><div class="row"><div><label>Agent Profile</label><select id="bc-agent-profile"></select></div><div><label>Delay Seconds</label><input id="bc-delay" type="number" value="3"></div><div><label>CSV File</label><input id="bc-file" type="file" accept=".csv"></div></div><div class="row"><div><button class="secondary" onclick="parseBatchCSV()">Parse CSV</button></div><div><button onclick="startBatch()">Start Batch</button></div></div><div class="mt progress"><span id="bc-progress"></span></div><div class="card mt"><table><thead><tr><th>Phone</th><th>Lead</th><th>Business</th></tr></thead><tbody id="bc-preview"></tbody></table></div></div></section>
<section class="panel" id="panel-campaigns"><div class="split"><div class="card"><div class="row"><div><label>Name</label><input id="camp-name"></div><div><label>Schedule</label><select id="camp-schedule"><option>once</option><option>daily</option><option>weekdays</option></select></div><div><label>Time</label><input id="camp-time" type="time" value="09:00"></div><div><label>Delay</label><input id="camp-delay" type="number" value="3"></div></div><div class="row"><div><label>Agent Profile</label><select id="camp-agent-profile"></select></div><div><label><input type="checkbox" id="camp-use-prompt" style="width:auto"> Custom Prompt</label><textarea id="camp-prompt" class="hidden"></textarea></div><div><label>CSV File</label><input id="camp-file" type="file" accept=".csv"></div></div><div class="mt"><button class="secondary" onclick="parseCampaignCSV()">Parse CSV</button> <button onclick="createCampaign()">Create Campaign</button></div><div class="mt"><table><thead><tr><th>Phone</th><th>Lead</th></tr></thead><tbody id="camp-preview"></tbody></table></div></div><div class="card"><table><thead><tr><th>Name</th><th>Status</th><th>Schedule</th><th>Totals</th><th>Actions</th></tr></thead><tbody id="campaign-rows"></tbody></table></div></div></section>
<section class="panel" id="panel-agents"><div class="split"><div class="card"><input type="hidden" id="agent-id"><div class="row"><div><label>Profile Name</label><input id="agent-name"></div><div><label>Voice</label><select id="agent-voice">${voiceOptions()}</select></div><div><label>Model</label><select id="agent-model"><option value="gemini-2.0-flash-live-001">gemini-2.0-flash-live-001</option><option value="gemini-2.5-flash-native-audio-preview-12-2025">gemini-2.5-flash-native-audio-preview-12-2025</option></select></div></div><div class="row"><div><label>Enabled Tools JSON</label><input id="agent-tools" value="[]"></div><div><label><input type="checkbox" id="agent-default" style="width:auto"> Default</label></div></div><div class="mt"><label>System Prompt</label><textarea id="agent-prompt"></textarea></div><div class="mt"><button onclick="saveAgentProfile()">Save Profile</button> <button class="secondary" onclick="resetAgentForm()">Reset</button></div></div><div class="card"><table><thead><tr><th>Name</th><th>Voice</th><th>Model</th><th>Default</th><th>Actions</th></tr></thead><tbody id="agent-rows"></tbody></table></div></div></section>
<section class="panel" id="panel-prompt"><div class="card"><label>Global System Prompt</label><textarea id="global-prompt" style="min-height:320px"></textarea><div class="mt" id="prompt-count">0 chars</div><div class="mt"><button onclick="savePrompt()">Save</button> <button class="secondary" onclick="resetPrompt()">Reset</button></div></div></section>
<section class="panel" id="panel-appointments"><div class="card"><div class="row"><div><label>Date Filter</label><input id="appt-date" type="date"></div><div><button onclick="loadAppointments()">Refresh</button></div></div><table class="mt"><thead><tr><th>Name</th><th>Phone</th><th>Date</th><th>Time</th><th>Timezone</th><th>Cal UID</th><th>Synced</th><th>Status</th><th></th></tr></thead><tbody id="appt-rows"></tbody></table></div></section>
<section class="panel" id="panel-calls"><div class="card"><table><thead><tr><th>Phone</th><th>Lead</th><th>Outcome</th><th>Duration</th><th>Timestamp</th><th>Recording</th><th>Notes</th></tr></thead><tbody id="call-rows"></tbody></table><div class="mt"><button class="secondary" onclick="loadCalls(Math.max(1,currentCallsPage-1))">Prev</button> <button class="secondary" onclick="loadCalls(currentCallsPage+1)">Next</button></div></div></section>
<section class="panel" id="panel-crm"><div class="split"><div class="card"><table><thead><tr><th>Phone</th><th>Name</th><th>Calls</th><th>Booked</th><th>Last</th></tr></thead><tbody id="crm-rows"></tbody></table></div><div class="card"><div id="crm-detail">Select a contact to see history.</div></div></div></section>
<section class="panel" id="panel-settings"><div class="card"><strong>Env-managed mode:</strong> update values in your VPS or container environment, then redeploy. The dashboard is read-only for runtime config.</div><div class="grid"><div class="card"><h3>LiveKit</h3><div class="row"><div><label>URL</label><input id="s-LIVEKIT_URL"></div><div><label>API Key</label><input id="s-LIVEKIT_API_KEY" type="password"></div><div><label>API Secret</label><input id="s-LIVEKIT_API_SECRET" type="password"></div></div><div class="mt"><button onclick="saveGroup(['LIVEKIT_URL','LIVEKIT_API_KEY','LIVEKIT_API_SECRET'])">Save</button></div></div><div class="card"><h3>Gemini</h3><div class="row"><div><label>API Key</label><input id="s-GOOGLE_API_KEY" type="password"></div><div><label>Model</label><input id="s-GEMINI_MODEL"></div><div><label>Voice</label><select id="s-GEMINI_TTS_VOICE">${voiceOptions()}</select></div><div><label>Realtime</label><input id="s-USE_GEMINI_REALTIME"></div></div><div class="mt"><button onclick="saveGroup(['GOOGLE_API_KEY','GEMINI_MODEL','GEMINI_TTS_VOICE','USE_GEMINI_REALTIME'])">Save</button></div></div><div class="card"><h3>Twilio Calling</h3><div class="row"><div><label>Account SID</label><input id="s-TWILIO_ACCOUNT_SID" type="password"></div><div><label>Auth Token</label><input id="s-TWILIO_AUTH_TOKEN" type="password"></div><div><label>From Number</label><input id="s-TWILIO_FROM_NUMBER"></div><div><label>Trunk SID</label><input id="s-TWILIO_TRUNK_SID"></div></div><div class="mt"><button onclick="saveGroup(['TWILIO_ACCOUNT_SID','TWILIO_AUTH_TOKEN','TWILIO_FROM_NUMBER','TWILIO_TRUNK_SID'])">Save</button> <button class="secondary" onclick="createSIPTrunk()">Link Trunk</button></div></div><div class="card"><h3>Recordings</h3><div class="row"><div><label>S3 Access Key</label><input id="s-S3_ACCESS_KEY_ID"></div><div><label>S3 Secret</label><input id="s-S3_SECRET_ACCESS_KEY" type="password"></div><div><label>S3 Endpoint</label><input id="s-S3_ENDPOINT_URL"></div><div><label>S3 Bucket</label><input id="s-S3_BUCKET"></div></div><div class="mt"><button onclick="saveGroup(['S3_ACCESS_KEY_ID','S3_SECRET_ACCESS_KEY','S3_ENDPOINT_URL','S3_BUCKET'])">Save</button></div></div><div class="card"><h3>Cal.com</h3><div class="row"><div><label>API Key</label><input id="s-CALCOM_API_KEY" type="password"></div><div><label>Booking URL</label><input id="s-CALCOM_BOOKING_URL"></div><div><label>Timezone</label><input id="s-CALCOM_TIMEZONE"></div></div><div class="mt"><button onclick="saveGroup(['CALCOM_API_KEY','CALCOM_BOOKING_URL','CALCOM_TIMEZONE'])">Save</button></div></div><div class="card"><h3>Tool Toggles</h3><label>Enabled Tools JSON</label><textarea id="s-ENABLED_TOOLS">[]</textarea><div class="mt"><button onclick="saveToolToggles()">Save Tools</button></div></div></div></section>
<section class="panel" id="panel-logs"><div class="card"><div class="row"><div><label>Level</label><select id="log-level"><option value="">all</option><option>info</option><option>warning</option><option>error</option></select></div><div><label>Source</label><input id="log-source"></div><div><button onclick="loadLogs()">Refresh</button></div><div><button class="secondary" onclick="toggleLogRefresh()"><span id="log-toggle">Pause</span></button></div><div><button class="danger" onclick="clearLogs()">Clear</button></div></div><pre class="mt" id="log-view" style="white-space:pre-wrap;max-height:520px;overflow:auto"></pre></div></section>
<section class="panel" id="panel-setup"><div class="grid"><div class="card"><h3>Quick Start</h3><p>1. Run the Supabase schema.</p><p>2. Save LiveKit, Gemini, and Twilio settings.</p><p>3. Link the Twilio trunk SID.</p><p>4. Create an agent profile.</p><p>5. Test a single call.</p></div><div class="card"><h3>Cost Snapshot</h3><p>Twilio PSTN depends on your account pricing.</p><p>LiveKit + Gemini realtime stays low-latency.</p><p>Recordings and SMS are optional add-ons.</p></div></div></section>`; $('f-use-prompt').onchange=e=>$('f-prompt').classList.toggle('hidden',!e.target.checked); $('camp-use-prompt').onchange=e=>$('camp-prompt').classList.toggle('hidden',!e.target.checked); $('global-prompt').oninput=()=>$('prompt-count').textContent=`${$('global-prompt').value.length} chars`; }
function voiceOptions(){return `<optgroup label="Female voices"><option value="Aoede">Aoede - warm, expressive</option><option value="Achernar">Achernar</option><option value="Autonoe">Autonoe</option><option value="Callirrhoe">Callirrhoe</option><option value="Despina">Despina</option><option value="Erinome">Erinome</option><option value="Gacrux">Gacrux</option><option value="Kore">Kore</option><option value="Laomedeia">Laomedeia</option><option value="Leda">Leda</option><option value="Pulcherrima">Pulcherrima</option><option value="Sulafat">Sulafat</option><option value="Vindemiatrix">Vindemiatrix</option><option value="Zephyr">Zephyr</option></optgroup><optgroup label="Male voices"><option value="Achird">Achird</option><option value="Algenib">Algenib</option><option value="Algieba">Algieba</option><option value="Alnilam">Alnilam</option><option value="Charon">Charon</option><option value="Enceladus">Enceladus</option><option value="Fenrir">Fenrir</option><option value="Iapetus">Iapetus</option><option value="Orus">Orus</option><option value="Perseus">Perseus</option><option value="Puck">Puck</option><option value="Rasalgethi">Rasalgethi</option><option value="Sadachbia">Sadachbia</option><option value="Sadaltager">Sadaltager</option><option value="Schedar">Schedar</option><option value="Umbriel">Umbriel</option><option value="Zubenelgenubi">Zubenelgenubi</option></optgroup>`}
function _mkChart(id,type,data,options){if(charts[id])charts[id].destroy(); charts[id]=new Chart($(id),{type,data,options});}
async function loadStats(){const d=await api('/api/stats');$('k-total').textContent=d.total_calls||0;$('k-booked').textContent=d.booked||0;$('k-ni').textContent=d.not_interested||0;$('k-rate').textContent=`${d.booking_rate_percent||0}%`;$('k-avg').textContent=`${d.avg_duration_seconds||0}s`;_renderCharts(d)}
async function loadLiveConfig(){const s=await api('/api/settings');const chips=['LIVEKIT_URL','GOOGLE_API_KEY','TWILIO_TRUNK_SID','SUPABASE_URL','GEMINI_MODEL'];$('live-chips').innerHTML=chips.map(k=>`<span class="chip">${k}: ${(s[k]?.configured||s[k]?.value)?'configured':'missing'}</span>`).join('')}
function _renderCharts(d){_mkChart('chart-outcomes','doughnut',{labels:Object.keys(d.outcomes||{}),datasets:[{data:Object.values(d.outcomes||{}),backgroundColor:['#00ff88','#00ccff','#ffaa00','#ff4d4d','#888']} ]},{plugins:{legend:{labels:{color:'#ddd'}}}});_mkChart('chart-timeline','line',{labels:(d.timeline||[]).map(x=>x.date),datasets:[{label:'Calls',data:(d.timeline||[]).map(x=>x.count),borderColor:'#00ccff'}]},{scales:{x:{ticks:{color:'#aaa'}},y:{ticks:{color:'#aaa'}}}});const durations=d.duration_by_outcome||{};_mkChart('chart-duration','bar',{labels:Object.keys(durations),datasets:[{label:'Avg Sec',data:Object.values(durations),backgroundColor:'#00ff88'}]},{scales:{x:{ticks:{color:'#aaa'}},y:{ticks:{color:'#aaa'}}}})}
let _callInProgress=false;async function submitSingleCall(){if(_callInProgress)return toast('Call already in progress — please wait','err');const btn=document.querySelector('#panel-single button');_callInProgress=true;if(btn){btn.disabled=true;btn.textContent='Calling...';}try{const body={phone:$('f-phone').value,lead_name:$('f-lead').value||'there',business_name:$('f-biz').value||'our company',service_type:$('f-service').value||'our service',agent_profile_id:$('f-agent-profile').value||null,system_prompt:$('f-use-prompt').checked?$('f-prompt').value:null};const res=await apiPost('/api/call',body);toast(res.status==='dispatched'?'Call dispatched':'Dispatch attempted')}catch(e){toast(e.message,'err')}finally{setTimeout(()=>{_callInProgress=false;if(btn){btn.disabled=false;btn.textContent='Start Call';}},10000)}}
function parseCSVText(text){const [header,...rows]=text.trim().split(/\r?\n/).filter(Boolean);const cols=header.split(',').map(s=>s.trim().toLowerCase());return rows.map(r=>{const v=r.split(',');const o={};cols.forEach((c,i)=>o[c]=v[i]?.trim()||'');return {phone:o.phone||o.number||'',lead_name:o.lead_name||o.name||'there',business_name:o.business_name||o.business||'our company',service_type:o.service_type||o.service||'our service'}})}
async function parseBatchCSV(){const file=$('bc-file').files[0]; if(!file)return toast('Choose a CSV file','err'); batchContacts=parseCSVText(await file.text()); $('bc-preview').innerHTML=batchContacts.map(c=>`<tr><td>${c.phone}</td><td>${c.lead_name}</td><td>${c.business_name}</td></tr>`).join(''); toast(`Parsed ${batchContacts.length} contacts`)}
async function startBatch(){if(!batchContacts.length)return toast('Parse CSV first','err'); for(let i=0;i<batchContacts.length;i++){const c=batchContacts[i]; await apiPost('/api/call',{phone:c.phone,lead_name:c.lead_name,business_name:c.business_name,service_type:c.service_type,agent_profile_id:$('bc-agent-profile').value||null}); $('bc-progress').style.width=`${((i+1)/batchContacts.length)*100}%`; if(i<batchContacts.length-1) await new Promise(r=>setTimeout(r,Number($('bc-delay').value||3)*1000));} toast('Batch dispatch complete')}
let campaignContacts=[]; async function parseCampaignCSV(){const file=$('camp-file').files[0]; if(!file)return toast('Choose a CSV file','err'); campaignContacts=parseCSVText(await file.text()); $('camp-preview').innerHTML=campaignContacts.map(c=>`<tr><td>${c.phone}</td><td>${c.lead_name}</td></tr>`).join('')}
async function loadCampaigns(){const rows=await api('/api/campaigns'); $('campaign-rows').innerHTML=(rows||[]).map(c=>`<tr><td>${c.name}</td><td>${c.status}</td><td>${c.schedule_type} ${c.schedule_time||''}</td><td>${c.total_dispatched||0}/${c.total_failed||0}</td><td><button class="secondary" onclick="runCampaign('${c.id}','${c.name}')">Run</button> <button class="secondary" onclick="toggleCampaignStatus('${c.id}','${c.status==='active'?'paused':'active'}')">${c.status==='active'?'Pause':'Resume'}</button> <button class="danger" onclick="deleteCampaign('${c.id}','${c.name}')">Delete</button></td></tr>`).join('')}
async function createCampaign(){try{const res=await apiPost('/api/campaigns',{name:$('camp-name').value,contacts:campaignContacts,schedule_type:$('camp-schedule').value,schedule_time:$('camp-time').value,call_delay_seconds:Number($('camp-delay').value||3),system_prompt:$('camp-use-prompt').checked?$('camp-prompt').value:null,agent_profile_id:$('camp-agent-profile').value||null}); toast(res.status||'created'); loadCampaigns()}catch(e){toast(e.message,'err')}}
window.runCampaign=async id=>{await apiPost(`/api/campaigns/${id}/run`,{});toast('Campaign queued');loadCampaigns()}
window.toggleCampaignStatus=async(id,newStatus)=>{await fetch(`/api/campaigns/${id}/status`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:newStatus})});toast(`Campaign ${newStatus}`);loadCampaigns()}
window.deleteCampaign=async(id)=>{await apiDel(`/api/campaigns/${id}`);toast('Campaign deleted');loadCampaigns()}
async function loadAgentProfiles(){const raw=await api('/api/agent-profiles');const profiles=Array.isArray(raw)?raw:[];currentProfiles=profiles;const opts=['<option value="">None</option>'].concat(profiles.map(p=>`<option value="${p.id}">${p.name}${p.is_default?' ★':''}</option>`)).join('');['f-agent-profile','bc-agent-profile','camp-agent-profile'].forEach(id=>$(id).innerHTML=opts);$('agent-rows').innerHTML=profiles.map(p=>`<tr><td>${p.name}</td><td>${p.voice}</td><td>${p.model}</td><td>${p.is_default?'★':''}</td><td><button class="secondary" onclick="editAgentProfile('${p.id}')">Edit</button> <button class="secondary" onclick="setDefaultAgentProfile('${p.id}','${p.name}')">Default</button> <button class="danger" onclick="deleteAgentProfile('${p.id}','${p.name}')">Delete</button></td></tr>`).join('')}
window.saveAgentProfile=async()=>{const payload={name:$('agent-name').value,voice:$('agent-voice').value,model:$('agent-model').value,system_prompt:$('agent-prompt').value,enabled_tools:$('agent-tools').value,is_default:$('agent-default').checked};const id=$('agent-id').value; const res=id?await fetch(`/api/agent-profiles/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(r=>r.json()):await apiPost('/api/agent-profiles',payload);toast(res.status||'saved');resetAgentForm();loadAgentProfiles()}
window.editAgentProfile=async id=>{const p=await api(`/api/agent-profiles/${id}`);$('agent-id').value=p.id;$('agent-name').value=p.name;$('agent-voice').value=p.voice;$('agent-model').value=p.model;$('agent-prompt').value=p.system_prompt||'';$('agent-tools').value=p.enabled_tools||'[]';$('agent-default').checked=!!p.is_default}
window.deleteAgentProfile=async id=>{await apiDel(`/api/agent-profiles/${id}`);toast('Profile deleted');loadAgentProfiles()}
window.setDefaultAgentProfile=async id=>{await apiPost(`/api/agent-profiles/${id}/set-default`,{});toast('Default updated');loadAgentProfiles()}
window.resetAgentForm=()=>{$('agent-id').value='';$('agent-name').value='';$('agent-prompt').value='';$('agent-tools').value='[]';$('agent-default').checked=false}
async function loadPrompt(){const p=await api('/api/prompt');$('global-prompt').value=p.prompt||'';$('prompt-count').textContent=`${$('global-prompt').value.length} chars`}
window.savePrompt=async()=>{try{const r=await apiPost('/api/prompt',{prompt:$('global-prompt').value});toast(r.status||'saved')}catch(e){toast(e.message,'err')}}
window.resetPrompt=async()=>{try{const r=await apiDel('/api/prompt');$('global-prompt').value=r.prompt||'';toast(r.status||'reset')}catch(e){toast(e.message,'err')}}
async function loadAppointments(){const date=$('appt-date')?.value;const rows=await api(`/api/appointments${date?`?date=${date}`:''}`);$('appt-rows').innerHTML=(rows||[]).map(a=>`<tr><td>${a.name}</td><td>${a.phone}</td><td>${a.date}</td><td>${a.time}</td><td>${a.timezone||'America/Chicago'}</td><td>${a.calcom_booking_uid||''}</td><td>${a.synced_to_calcom?'yes':'fallback'}</td><td>${a.status}</td><td>${a.status==='booked'?`<button class="danger" onclick="cancelAppointment('${a.id}')">Cancel</button>`:''}</td></tr>`).join('')}
window.cancelAppointment=async id=>{await apiDel(`/api/appointments/${id}`);toast('Appointment cancelled');loadAppointments()}
async function loadCalls(page=1){currentCallsPage=page;const rows=await api(`/api/calls?page=${page}&limit=20`);$('call-rows').innerHTML=(rows||[]).map(c=>`<tr><td>${c.phone_number}</td><td>${c.lead_name||''}</td><td><span class="badge">${c.outcome||''}</span></td><td>${c.duration_seconds||0}s</td><td>${c.timestamp||''}</td><td>${c.recording_url?`<a href="${c.recording_url}" target="_blank">Open</a>`:''}</td><td><textarea id="note-${c.id}" style="min-height:70px">${c.notes||''}</textarea><button class="secondary mt" onclick="saveNotes('${c.id}')">Save</button></td></tr>`).join('')}
window.saveNotes=async callId=>{await fetch(`/api/calls/${callId}/notes`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes:$(`note-${callId}`).value})});toast('Notes saved')}
async function loadCRM(){const res=await api('/api/crm');$('crm-rows').innerHTML=(res.data||[]).map(c=>`<tr onclick="loadContactDetail('${c.phone_number}')" style="cursor:pointer"><td>${c.phone_number}</td><td>${c.lead_name||''}</td><td>${c.total_calls}</td><td>${c.booked}</td><td>${c.last_outcome||''}</td></tr>`).join('')}
window.loadContactDetail=async phone=>{const res=await api(`/api/crm/calls?phone=${encodeURIComponent(phone)}`);$('crm-detail').innerHTML=`<h3>${phone}</h3><div class="mt">${(res.data||[]).map(c=>`<div class="card mt"><strong>${c.outcome||'unknown'}</strong><div>${c.timestamp||''}</div><div>${c.reason||''}</div><div>${c.notes||''}</div></div>`).join('')}</div>`}
async function loadSettings(){const s=await api('/api/settings'); Object.keys(s||{}).forEach(k=>{const el=$(`s-${k}`); if(el) el.value=s[k].value||''})}
async function saveGroup(group){try{const settings={};group.forEach(k=>settings[k]=$(`s-${k}`).value);const res=await apiPost('/api/settings',{settings});toast(`Saved ${res.count||0} fields`);loadLiveConfig()}catch(e){toast(e.message,'err')}}
window.createSIPTrunk=async()=>{try{const res=await apiPost('/api/setup/trunk',{});toast(res.status||'linked');loadSettings()}catch(e){toast(e.message,'err')}}
window.saveToolToggles=async()=>{try{await apiPost('/api/settings',{settings:{ENABLED_TOOLS:$('s-ENABLED_TOOLS').value}});toast('Tools saved')}catch(e){toast(e.message,'err')}}
async function loadLogs(){const level=$('log-level')?.value||'';const source=$('log-source')?.value||'';const rows=await api(`/api/logs?limit=200${level?`&level=${level}`:''}${source?`&source=${encodeURIComponent(source)}`:''}`);$('log-view').textContent=(rows||[]).map(r=>`[${r.timestamp}] ${r.level.toUpperCase()} ${r.source}: ${r.message}${r.detail?` | ${r.detail}`:''}`).join('\n')}
function scheduleLogsRefresh(){if(logTimer)clearInterval(logTimer);logTimer=setInterval(()=>{if(!logPaused)loadLogs()},5000)}
function toggleLogRefresh(){logPaused=!logPaused;$('log-toggle').textContent=logPaused?'Resume':'Pause'}
async function clearLogs(){await apiDel('/api/logs');toast('Logs cleared');loadLogs()}
function init(){buildUI();loadStats();loadCalls();loadAppointments();loadLogs();loadAgentProfiles();setInterval(loadStats,10000);scheduleLogsRefresh()}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
